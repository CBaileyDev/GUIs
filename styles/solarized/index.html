<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solarized Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --base03: #002b36; --base02: #073642; --base01: #586e75; --base00: #657b83;
      --base0: #839496; --base1: #93a1a1; --base2: #eee8d5; --base3: #fdf6e3;
      --yellow: #b58900; --orange: #cb4b16; --red: #dc322f; --magenta: #d33682;
      --violet: #6c71c4; --blue: #268bd2; --cyan: #2aa198; --green: #859900;
    }
    body {
      font-family: 'Fira Sans', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex; align-items: flex-start; justify-content: center;
      background: var(--base3); color: var(--base00);
    }
    .card {
      width: 420px; padding: 32px;
      background: var(--base2); border: 1px solid var(--base1);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(101,123,131,0.2);
    }
    .eyebrow {
      font-family: 'Fira Code', monospace;
      font-size: 11px; color: var(--cyan); margin-bottom: 6px;
    }
    h1 { font-size: 28px; font-weight: 700; color: var(--base01); }
    h1 span { color: var(--yellow); }
    .sub { font-size: 13px; color: var(--base00); margin-top: 4px; margin-bottom: 22px; }

    .section-title {
      font-family: 'Fira Code', monospace; font-size: 11px;
      color: var(--magenta); text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .section-title::before { content: '; '; color: var(--base1); }

    .btn-row { display: flex; gap: 12px; margin-bottom: 22px; }
    .btn {
      flex: 1; padding: 11px; font-family: inherit;
      font-size: 14px; font-weight: 600;
      border-radius: 6px; cursor: pointer; border: 1px solid transparent;
      transition: filter 0.15s;
    }
    .btn-primary { background: var(--blue); color: var(--base3); }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-secondary { background: var(--base3); color: var(--base01); border-color: var(--base1); }
    .btn-secondary:hover { background: #f6efd7; }

    .form-group { margin-bottom: 20px; }
    .form-label {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--base01); margin-bottom: 8px; font-weight: 500;
    }
    .form-label .value {
      font-family: 'Fira Code', monospace; color: var(--base3);
      background: var(--violet); padding: 1px 8px; border-radius: 4px; font-size: 12px;
    }

    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 4px;
      background: var(--base1); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: var(--blue); border: 2px solid var(--base2);
      box-shadow: 0 0 0 1px var(--blue);
    }

    .checkbox-row {
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      padding: 10px 12px; border-radius: 6px;
      background: var(--base3); border: 1px solid var(--base1);
      margin-bottom: 18px;
    }
    .checkbox-row:hover { border-color: var(--blue); }
    .checkbox-row input { display: none; }
    .chk {
      width: 18px; height: 18px; border-radius: 4px;
      border: 1.5px solid var(--base1); background: var(--base2);
      position: relative; flex-shrink: 0;
    }
    input[type="checkbox"]:checked ~ .chk { background: var(--green); border-color: var(--green); }
    input[type="checkbox"]:checked ~ .chk::after {
      content: ''; position: absolute; left: 5px; top: 1px;
      width: 5px; height: 10px; border: solid var(--base3);
      border-width: 0 2px 2px 0; transform: rotate(45deg);
    }
    .chk-label { font-size: 14px; color: var(--base01); }

    select, input[type="text"] {
      width: 100%; padding: 10px 12px;
      font-family: inherit; font-size: 14px;
      color: var(--base01); background: var(--base3);
      border: 1px solid var(--base1); border-radius: 6px; outline: none;
    }
    select option { background: var(--base3); }
    select:focus, input[type="text"]:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(38,139,210,0.18); }
    input[type="text"]::placeholder { color: var(--base1); }

    .output {
      margin-top: 22px; padding: 12px 14px;
      background: var(--base03); color: var(--base1);
      border-radius: 6px; font-family: 'Fira Code', monospace; font-size: 12px;
      min-height: 40px;
    }
    .output strong { color: var(--green); }
    .output em { color: var(--yellow); font-style: normal; }
  

/* @@MODERNIZED-v1-start @@ */
html { color-scheme: light; }
body {
    min-height: 100dvh;
    accent-color: #268bd2;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-synthesis: none;
}
:focus-visible {
    outline: 2px solid #268bd2;
    outline-offset: 2px;
    border-radius: 6px;
}
a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
textarea:focus-visible, [role="switch"]:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #268bd2;
    outline-offset: 2px;
}
::selection { background: color-mix(in srgb, #268bd2 30%, transparent); color: inherit; }
img { image-rendering: auto; }
html { scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
    }
}
body { background:
                radial-gradient(900px 500px at 10% 0%, rgba(38,139,210,0.10), transparent 60%),
                #fdf6e3 !important; }
/* @@MODERNIZED-v1-end @@ */
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">// solarized-light</div>
    <h1>Solar<span>ized</span></h1>
    <div class="sub">Precision colors for machines and people</div>

    <div class="section-title">actions</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="log('apply')">Apply</button>
      <button class="btn btn-secondary" onclick="log('reset')">Reset</button>
    </div>

    <div class="form-group">
      <div class="form-label">Brightness <span class="value" id="v">70</span></div>
      <input type="range" min="0" max="100" value="70" oninput="document.getElementById('v').textContent=this.value;log('brightness '+this.value)">
    </div>

    <label class="checkbox-row">
      <input type="checkbox" onchange="log('high-contrast '+this.checked)">
      <span class="chk"></span>
      <span class="chk-label">High contrast mode</span>
    </label>

    <div class="form-group">
      <div class="form-label">Variant</div>
      <select onchange="log('variant '+this.value)">
        <option>Solarized Light</option><option>Solarized Dark</option>
        <option>Accent: Blue</option><option>Accent: Cyan</option>
      </select>
    </div>

    <div class="form-group">
      <input type="text" placeholder="config.key..." oninput="log('key '+this.value)">
    </div>

    <div class="output" id="out"><strong>ok</strong> // <em>ready</em></div>
  </div>
  <script>function log(m){document.getElementById('out').innerHTML='<strong>ok</strong> // '+m;}</script>
</body>
</html>
