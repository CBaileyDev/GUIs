<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Sketch Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Kalam', cursive;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex; align-items: flex-start; justify-content: center;
      background:
        radial-gradient(circle at 10% 10%, rgba(0,0,0,0.04), transparent 30%),
        radial-gradient(circle at 80% 90%, rgba(0,0,0,0.06), transparent 25%),
        repeating-linear-gradient(0deg, transparent 0 35px, rgba(120,150,200,0.22) 35px 36px),
        #faf6ee;
      color: #2a2a2a;
    }
    .card {
      width: 440px; padding: 30px 32px;
      background: transparent; position: relative;
    }
    .card::before {
      content: ''; position: absolute; inset: 8px;
      border: 2.5px solid #222; border-radius: 8px;
      transform: rotate(-0.3deg);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.08);
    }
    .card::after {
      content: ''; position: absolute; inset: 12px;
      border: 1.5px solid #222; border-radius: 6px;
      transform: rotate(0.4deg);
      opacity: 0.55;
    }
    .content { position: relative; z-index: 2; }

    h1 {
      font-family: 'Caveat', cursive; font-weight: 700;
      font-size: 42px; color: #222; transform: rotate(-1deg); line-height: 1;
    }
    .sub { font-size: 16px; color: #555; margin-top: 4px; margin-bottom: 20px; transform: rotate(0.3deg); }

    .section-title {
      font-family: 'Caveat', cursive; font-size: 22px; font-weight: 700;
      color: #222; margin-bottom: 6px;
      border-bottom: 2px solid #222; padding-bottom: 2px;
      display: inline-block; transform: rotate(-0.5deg);
    }

    .btn-row { display: flex; gap: 14px; margin: 14px 0 20px; }
    .btn {
      flex: 1; padding: 12px;
      font-family: 'Caveat', cursive; font-size: 20px; font-weight: 700;
      background: transparent; color: #222;
      border: 2.5px solid #222; border-radius: 10px;
      cursor: pointer;
      transition: transform 0.08s, background 0.1s, box-shadow 0.1s;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
    }
    .btn-primary { background: #ffe066; transform: rotate(-0.6deg); }
    .btn-secondary { background: #c3ecff; transform: rotate(0.6deg); }
    .btn:hover { transform: translate(-1px,-1px) rotate(0deg); box-shadow: 5px 5px 0 rgba(0,0,0,0.18); }
    .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 rgba(0,0,0,0.15); }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: flex; justify-content: space-between;
      font-family: 'Caveat', cursive; font-size: 20px; color: #222;
      margin-bottom: 6px;
    }
    .form-label .value {
      background: #ffb3d9; padding: 0 8px; border: 2px solid #222; border-radius: 6px;
      transform: rotate(-1deg); display: inline-block; font-size: 16px;
    }

    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 12px;
      background: #fff; border: 2.5px solid #222; border-radius: 10px;
      outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: #ff6b6b; border: 2.5px solid #222;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
    }

    .checkbox-row {
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      padding: 10px 12px; margin-bottom: 18px;
      border: 2.5px solid #222; border-radius: 10px;
      background: #fff; transform: rotate(-0.3deg);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
    }
    .checkbox-row input { display: none; }
    .chk {
      width: 26px; height: 26px; border-radius: 6px;
      background: #fff; border: 2.5px solid #222;
      position: relative; flex-shrink: 0; transform: rotate(-2deg);
    }
    input[type="checkbox"]:checked ~ .chk::after {
      content: '✗'; position: absolute; inset: -4px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Caveat', cursive; font-size: 34px; color: #ff3b3b;
      font-weight: 700;
    }
    .chk-label { font-family: 'Caveat', cursive; font-size: 20px; color: #222; }

    select, input[type="text"] {
      width: 100%; padding: 10px 14px;
      font-family: 'Kalam', cursive; font-size: 16px;
      background: #fff; color: #222;
      border: 2.5px solid #222; border-radius: 10px; outline: none;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
    }
    select:focus, input[type="text"]:focus { background: #fffbdd; }
    input[type="text"]::placeholder { color: #888; }

    .output {
      margin-top: 20px; padding: 12px 16px;
      border: 2.5px dashed #222; border-radius: 10px;
      font-family: 'Caveat', cursive; font-size: 20px; color: #222;
      background: rgba(255,255,255,0.6); min-height: 50px;
      transform: rotate(-0.4deg);
    }
    .output strong { background: #ffe066; padding: 0 6px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="content">
      <h1>Paper & Pencil</h1>
      <div class="sub">~ scribbled, sketched, hand-drawn ~</div>

      <div class="section-title">Controls</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="log('Applied!')">Apply</button>
        <button class="btn btn-secondary" onclick="log('Erased!')">Reset</button>
      </div>

      <div class="form-group">
        <div class="form-label">Pencil pressure <span class="value" id="v">62</span></div>
        <input type="range" min="0" max="100" value="62" oninput="document.getElementById('v').textContent=this.value;log('Pressure '+this.value)">
      </div>

      <label class="checkbox-row">
        <input type="checkbox" onchange="log('Wobble '+this.checked)">
        <span class="chk"></span>
        <span class="chk-label">Hand-drawn wobble</span>
      </label>

      <div class="form-group">
        <div class="form-label">Paper</div>
        <select onchange="log('Paper '+this.value)">
          <option>Ruled</option><option>Graph</option>
          <option>Dot Grid</option><option>Kraft</option>
        </select>
      </div>

      <div class="form-group">
        <input type="text" placeholder="Write a note..." oninput="log('Note: '+this.value)">
      </div>

      <div class="output" id="out"><strong>dear diary —</strong> ready to draw!</div>
    </div>
  </div>
  <script>function log(m){document.getElementById('out').innerHTML='<strong>dear diary —</strong> '+m;}</script>
</body>
</html>
