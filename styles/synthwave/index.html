<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synthwave Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --pink: #ff2bd0; --cyan: #00eaff; --purple: #8a2be2; --bg: #0a0320; }
    body {
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex; align-items: flex-start; justify-content: center;
      background:
        linear-gradient(180deg, #0a0320 0%, #1a0640 55%, #ff2bd0 100%),
        #0a0320;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background:
        linear-gradient(transparent 96%, rgba(255,43,208,0.4) 96%, rgba(255,43,208,0.4) 100%),
        linear-gradient(90deg, transparent 96%, rgba(0,234,255,0.3) 96%, rgba(0,234,255,0.3) 100%);
      background-size: 100% 40px, 40px 100%;
      animation: gridmove 6s linear infinite;
    }
    @keyframes gridmove { to { background-position: 0 40px, 40px 0; } }
    body::after {
      content: ''; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 600px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,100,230,0.5), transparent 70%);
      filter: blur(40px); pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      width: 420px;
      padding: 32px;
      background: linear-gradient(145deg, rgba(20,8,50,0.85), rgba(50,12,90,0.85));
      border: 2px solid transparent;
      border-radius: 8px;
      background-clip: padding-box;
      box-shadow:
        0 0 0 1px rgba(255,43,208,0.4),
        0 0 30px rgba(255,43,208,0.5),
        0 0 60px rgba(0,234,255,0.25),
        inset 0 0 40px rgba(138,43,226,0.15);
      backdrop-filter: blur(6px);
    }
    h1 {
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 32px;
      text-transform: uppercase; letter-spacing: 2px;
      background: linear-gradient(180deg, #ffffff 0%, #ff2bd0 60%, #8a2be2 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(255,43,208,0.6));
      text-align: center;
    }
    .sub {
      font-family: 'Orbitron', sans-serif; font-size: 11px;
      letter-spacing: 6px; color: var(--cyan); text-align: center;
      margin-top: 4px; margin-bottom: 22px;
      text-shadow: 0 0 8px var(--cyan);
    }

    .section-title {
      font-family: 'Orbitron', sans-serif; font-size: 10px;
      letter-spacing: 3px; color: var(--pink); text-transform: uppercase;
      margin-bottom: 10px; text-shadow: 0 0 6px var(--pink);
    }

    .btn-row { display: flex; gap: 12px; margin-bottom: 20px; }
    .btn {
      flex: 1; padding: 12px;
      font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      border-radius: 4px; cursor: pointer; position: relative;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 16px rgba(255,43,208,0.55), inset 0 0 10px rgba(255,255,255,0.15);
    }
    .btn-primary:hover { box-shadow: 0 0 24px rgba(255,43,208,0.8); }
    .btn-secondary {
      background: transparent; color: var(--cyan);
      border: 1px solid var(--cyan); text-shadow: 0 0 8px var(--cyan);
      box-shadow: 0 0 10px rgba(0,234,255,0.3), inset 0 0 10px rgba(0,234,255,0.08);
    }
    .btn-secondary:hover { background: rgba(0,234,255,0.12); }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: flex; justify-content: space-between;
      font-size: 12px; font-family: 'Orbitron', sans-serif;
      text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
    }
    .form-label span { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }

    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: #fff; border: 2px solid var(--pink);
      box-shadow: 0 0 10px var(--pink);
    }

    .checkbox-row {
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      padding: 10px 12px; border: 1px solid rgba(255,43,208,0.3); border-radius: 4px;
      background: rgba(255,43,208,0.05); margin-bottom: 16px;
      color: rgba(255,255,255,0.85);
    }
    .checkbox-row:hover { border-color: var(--pink); background: rgba(255,43,208,0.1); }
    .checkbox-row input { display: none; }
    .chk {
      width: 18px; height: 18px; border: 2px solid var(--pink); border-radius: 2px;
      position: relative; flex-shrink: 0;
    }
    input[type="checkbox"]:checked ~ .chk {
      background: var(--pink); box-shadow: 0 0 10px var(--pink);
    }
    input[type="checkbox"]:checked ~ .chk::after {
      content: '✓'; position: absolute; inset: 0; color: #fff;
      display: flex; align-items: center; justify-content: center; font-size: 12px;
    }

    select, input[type="text"] {
      width: 100%; padding: 10px 12px;
      background: rgba(10,3,32,0.8); color: #fff;
      border: 1px solid rgba(0,234,255,0.4); border-radius: 4px;
      font-family: 'Rajdhani', sans-serif; font-size: 14px;
      outline: none;
    }
    select option { background: #0a0320; }
    input[type="text"]:focus, select:focus {
      border-color: var(--cyan); box-shadow: 0 0 12px rgba(0,234,255,0.4);
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }

    .output {
      margin-top: 18px; padding: 12px;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(138,43,226,0.4);
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 1px;
      color: rgba(255,255,255,0.7); min-height: 40px;
    }
    .output strong { color: var(--cyan); text-shadow: 0 0 6px var(--cyan); }
  

/* @@MODERNIZED-v1-start @@ */
html { color-scheme: dark; }
body {
    min-height: 100dvh;
    accent-color: #ff2bd0;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-synthesis: none;
}
:focus-visible {
    outline: 2px solid #ff2bd0;
    outline-offset: 2px;
    border-radius: 6px;
}
a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
textarea:focus-visible, [role="switch"]:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid #ff2bd0;
    outline-offset: 2px;
}
::selection { background: color-mix(in srgb, #ff2bd0 30%, transparent); color: inherit; }
img { image-rendering: auto; }
html { scroll-behavior: smooth; }
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
    }
}
body { background:
                radial-gradient(900px 500px at 50% 0%, rgba(255,43,208,0.18), transparent 60%),
                radial-gradient(800px 500px at 100% 100%, rgba(0,234,255,0.12), transparent 60%),
                #0a0320 !important; }
/* @@MODERNIZED-v1-end @@ */
</style>
</head>
<body>
  <div class="card">
    <h1>Synthwave</h1>
    <div class="sub">NEON · RETRO · FUTURE</div>

    <div class="section-title">// Controls</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="log('Boost engaged')">Boost</button>
      <button class="btn btn-secondary" onclick="log('Reset')">Reset</button>
    </div>

    <div class="form-group">
      <div class="form-label">Drive <span id="v">75%</span></div>
      <input type="range" min="0" max="100" value="75" oninput="document.getElementById('v').textContent=this.value+'%';log('Drive '+this.value+'%')">
    </div>

    <label class="checkbox-row">
      <input type="checkbox" onchange="log('Chromatic '+this.checked)">
      <span class="chk"></span>
      <span>Enable chromatic aberration</span>
    </label>

    <div class="form-group">
      <div class="form-label">Palette</div>
      <select onchange="log('Palette '+this.value)">
        <option>Miami Nights</option><option>Outrun</option>
        <option>Tokyo Drift</option><option>Hotline</option>
      </select>
    </div>

    <div class="form-group">
      <input type="text" placeholder="Enter callsign..." oninput="log('Callsign '+this.value)">
    </div>

    <div class="output" id="out"><strong>STATUS</strong> — Engines idle</div>
  </div>
  <script>function log(m){document.getElementById('out').innerHTML='<strong>STATUS</strong> — '+m;}</script>
</body>
</html>
