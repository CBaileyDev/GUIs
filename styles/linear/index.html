<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linear Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08090a; --panel: #101113; --line: #1f2022;
      --fg: #f7f8f8; --fg-muted: #8a8f98; --fg-faint: #62666d;
      --accent: #5e6ad2; --accent-hi: #7885ff;
    }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      min-height: 100vh; padding: 40px 20px;
      display: flex; align-items: flex-start; justify-content: center;
      background:
        radial-gradient(1200px 600px at 50% -200px, rgba(94,106,210,0.25), transparent 60%),
        var(--bg);
      color: var(--fg);
      font-feature-settings: "cv11";
    }

    .card {
      width: 440px; padding: 28px;
      background: linear-gradient(180deg, #131416 0%, #0e0f11 100%);
      border: 1px solid var(--line); border-radius: 12px;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.04) inset,
        0 24px 48px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,255,255,0.02);
    }
    .meta-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .logo {
      width: 22px; height: 22px; border-radius: 6px;
      background: linear-gradient(135deg, #5e6ad2, #9dabff);
      display: flex; align-items: center; justify-content: center;
      color: #0b0b12; font-weight: 800; font-size: 11px;
    }
    .path { font-size: 12px; color: var(--fg-faint); }
    .path b { color: var(--fg-muted); font-weight: 500; }

    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    .sub { font-size: 13px; color: var(--fg-muted); margin-top: 4px; margin-bottom: 22px; }

    hr { border: none; border-top: 1px solid var(--line); margin: 18px 0; }

    .section-title {
      font-size: 11px; letter-spacing: 0.3px; color: var(--fg-faint);
      margin-bottom: 10px; text-transform: uppercase; font-weight: 600;
    }

    .btn-row { display: flex; gap: 8px; margin-bottom: 18px; }
    .btn {
      padding: 7px 12px; font-family: inherit;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border-radius: 6px; border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s, filter 0.12s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-primary:hover { background: var(--accent-hi); }
    .btn-secondary {
      background: transparent; color: var(--fg);
      border-color: var(--line);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.03); border-color: #2a2b2f; }
    .kbd {
      font-size: 10px; padding: 0 4px; border-radius: 3px;
      background: rgba(255,255,255,0.06); color: var(--fg-muted);
      border: 1px solid var(--line);
    }

    .form-group { margin-bottom: 14px; }
    .form-label {
      display: flex; justify-content: space-between;
      font-size: 12px; font-weight: 500; color: var(--fg-muted); margin-bottom: 6px;
    }
    .form-label .value { color: var(--accent-hi); font-variant-numeric: tabular-nums; }

    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 4px;
      background: var(--line); border-radius: 2px; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: var(--fg); border: 2px solid var(--accent);
    }

    .checkbox-row {
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      padding: 8px 10px; border-radius: 6px;
      border: 1px solid var(--line); margin-bottom: 14px;
      transition: background 0.12s;
    }
    .checkbox-row:hover { background: rgba(255,255,255,0.02); }
    .checkbox-row input { display: none; }
    .chk {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid var(--fg-faint); background: transparent;
      position: relative; flex-shrink: 0;
      transition: background 0.12s, border-color 0.12s;
    }
    input[type="checkbox"]:checked ~ .chk { background: var(--accent); border-color: var(--accent); }
    input[type="checkbox"]:checked ~ .chk::after {
      content: ''; position: absolute; left: 4px; top: 0.5px;
      width: 5px; height: 10px; border: solid #fff;
      border-width: 0 2px 2px 0; transform: rotate(45deg);
    }
    .chk-label { font-size: 13px; color: var(--fg); flex: 1; }
    .chk-desc { font-size: 12px; color: var(--fg-muted); }

    select, input[type="text"] {
      width: 100%; padding: 8px 10px;
      font-family: inherit; font-size: 13px;
      color: var(--fg); background: rgba(255,255,255,0.02);
      border: 1px solid var(--line); border-radius: 6px; outline: none;
    }
    select option { background: var(--bg); }
    select:focus, input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(94,106,210,0.25); }
    input[type="text"]::placeholder { color: var(--fg-faint); }

    .output {
      margin-top: 18px; padding: 10px 12px;
      background: rgba(255,255,255,0.02); border: 1px solid var(--line);
      border-radius: 6px; font-size: 12px; color: var(--fg-muted);
      display: flex; align-items: center; gap: 8px; min-height: 38px;
    }
    .output::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }
    .output strong { color: var(--fg); font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="meta-row">
      <div class="logo">L</div>
      <div class="path"><b>ENG</b> / Issue settings</div>
    </div>
    <h1>Menu preferences</h1>
    <div class="sub">Quick actions and workspace defaults.</div>

    <div class="section-title">Actions</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="log('Saved changes')">Save changes <span class="kbd">⌘S</span></button>
      <button class="btn btn-secondary" onclick="log('Discarded')">Discard</button>
    </div>

    <hr>

    <div class="section-title">Display</div>

    <div class="form-group">
      <div class="form-label">Sidebar width <span class="value" id="v">240px</span></div>
      <input type="range" min="180" max="360" value="240" oninput="document.getElementById('v').textContent=this.value+'px';log('Sidebar '+this.value+'px')">
    </div>

    <label class="checkbox-row">
      <input type="checkbox" checked onchange="log('Compact mode '+this.checked)">
      <span class="chk"></span>
      <div>
        <div class="chk-label">Compact mode</div>
        <div class="chk-desc">Reduces padding across the app.</div>
      </div>
    </label>

    <div class="form-group">
      <div class="form-label">Default view</div>
      <select onchange="log('View '+this.value)">
        <option>Board</option><option>List</option>
        <option>Timeline</option><option>Spreadsheet</option>
      </select>
    </div>

    <div class="form-group">
      <div class="form-label">Workspace name</div>
      <input type="text" placeholder="acme-eng" oninput="log('Workspace '+this.value)">
    </div>

    <div class="output" id="out"><strong>Synced</strong> · a moment ago</div>
  </div>
  <script>function log(m){document.getElementById('out').innerHTML='<strong>'+m+'</strong> · now';}</script>
</body>
</html>
