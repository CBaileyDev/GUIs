<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Material Design 3 Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --md-sys-color-primary: #6750A4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #EADDFF;
      --md-sys-color-on-primary-container: #21005D;
      --md-sys-color-secondary: #625B71;
      --md-sys-color-secondary-container: #E8DEF8;
      --md-sys-color-surface: #FEF7FF;
      --md-sys-color-surface-container: #F3EDF7;
      --md-sys-color-surface-container-high: #ECE6F0;
      --md-sys-color-on-surface: #1C1B1F;
      --md-sys-color-on-surface-variant: #49454F;
      --md-sys-color-outline: #79747E;
      --md-sys-color-outline-variant: #CAC4D0;
      --md-elevation-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
      --md-elevation-2: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
      --md-elevation-3: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.3);
    }

    body {
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--md-sys-color-surface);
    }

    .card {
      width: 400px;
      padding: 0;
      border-radius: 28px;
      background: var(--md-sys-color-surface-container);
      box-shadow: var(--md-elevation-2);
      overflow: hidden;
    }

    /* Header bar */
    .card-header {
      background: var(--md-sys-color-primary-container);
      padding: 28px 28px 24px;
      position: relative;
    }
    .card-header .eyebrow {
      font-family: 'Roboto', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--md-sys-color-secondary);
      margin-bottom: 4px;
    }
    .card-header h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--md-sys-color-on-primary-container);
      line-height: 1.2;
    }

    .card-body { padding: 24px 28px 28px; }

    /* M3 Filled button */
    .btn-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .btn {
      flex: 1;
      padding: 10px 24px;
      border-radius: 99px;
      border: none;
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: inherit;
    }
    .btn:hover::after { opacity: 0.08; }
    .btn:active::after { opacity: 0.12; }

    .btn-filled {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      box-shadow: var(--md-elevation-1);
    }
    .btn-filled:hover { box-shadow: var(--md-elevation-2); }

    .btn-tonal {
      background: var(--md-sys-color-secondary-container);
      color: var(--md-sys-color-on-primary-container);
    }
    .btn-tonal:hover { box-shadow: var(--md-elevation-1); }

    /* Section label */
    .section-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 10px;
    }

    /* M3 Slider */
    .form-group { margin-bottom: 22px; }
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .slider-header .label {
      font-size: 14px;
      font-weight: 500;
      color: var(--md-sys-color-on-surface);
    }
    .slider-header .value {
      font-size: 14px;
      color: var(--md-sys-color-primary);
      font-weight: 500;
    }
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 99px;
      background: var(--md-sys-color-outline-variant);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--md-sys-color-primary);
      border: none;
      box-shadow: 0 0 0 10px rgba(103,80,164,0.12);
      transition: box-shadow 0.2s;
    }
    input[type="range"]:hover::-webkit-slider-thumb {
      box-shadow: 0 0 0 14px rgba(103,80,164,0.16);
    }

    /* M3 Checkbox row */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 22px;
      transition: background 0.2s;
    }
    .checkbox-row:hover { background: rgba(103,80,164,0.08); }
    .checkbox-row input[type="checkbox"] { display: none; }
    .check-box {
      width: 18px; height: 18px;
      border-radius: 2px;
      border: 2px solid var(--md-sys-color-outline);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .check-box svg { display: none; }
    input[type="checkbox"]:checked ~ .check-box {
      background: var(--md-sys-color-primary);
      border-color: var(--md-sys-color-primary);
      border-radius: 2px;
    }
    input[type="checkbox"]:checked ~ .check-box svg { display: block; }
    .check-label {
      font-size: 14px;
      font-weight: 400;
      color: var(--md-sys-color-on-surface);
    }

    /* M3 Outlined select */
    .field-wrapper { position: relative; margin-bottom: 22px; }
    .m3-select {
      width: 100%;
      padding: 16px 48px 16px 16px;
      border-radius: 4px 4px 0 0;
      background: var(--md-sys-color-surface-container-high);
      border: none;
      border-bottom: 1px solid var(--md-sys-color-outline);
      color: var(--md-sys-color-on-surface);
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .m3-select:focus { border-bottom: 2px solid var(--md-sys-color-primary); }
    .field-arrow {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--md-sys-color-on-surface-variant);
    }
    .field-floating-label {
      position: absolute;
      left: 16px; top: -9px;
      font-size: 12px;
      font-weight: 500;
      color: var(--md-sys-color-primary);
      background: var(--md-sys-color-surface-container-high);
      padding: 0 4px;
    }

    /* M3 Filled text field */
    .text-field-wrapper { position: relative; margin-bottom: 20px; }
    .m3-input {
      width: 100%;
      padding: 20px 16px 8px;
      border-radius: 4px 4px 0 0;
      background: var(--md-sys-color-surface-container-high);
      border: none;
      border-bottom: 1px solid var(--md-sys-color-outline);
      color: var(--md-sys-color-on-surface);
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      outline: none;
    }
    .m3-input:focus { border-bottom: 2px solid var(--md-sys-color-primary); }
    .m3-input:focus + .input-label,
    .m3-input:not(:placeholder-shown) + .input-label {
      top: 8px;
      font-size: 12px;
      color: var(--md-sys-color-primary);
    }
    .input-label {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--md-sys-color-on-surface-variant);
      pointer-events: none;
      transition: all 0.15s;
    }

    /* Output chip */
    .output {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      padding: 10px 16px;
      border-radius: 8px;
      background: var(--md-sys-color-surface-container-high);
      border: 1px solid var(--md-sys-color-outline-variant);
      font-size: 13px;
      color: var(--md-sys-color-on-surface-variant);
    }
    .output-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--md-sys-color-primary);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="eyebrow">Style Showcase</div>
      <h1>Material Design 3</h1>
    </div>
    <div class="card-body">

      <div class="btn-row">
        <button class="btn btn-filled" onclick="log('Apply clicked')">Apply</button>
        <button class="btn btn-tonal" onclick="log('Reset clicked')">Reset</button>
      </div>

      <div class="form-group">
        <div class="slider-header">
          <span class="label">Brightness</span>
          <span class="value" id="brightnessVal">55%</span>
        </div>
        <input type="range" min="0" max="100" value="55"
          oninput="document.getElementById('brightnessVal').textContent=this.value+'%'; log('Brightness: '+this.value+'%')">
      </div>

      <label class="checkbox-row">
        <input type="checkbox" id="dynColor" onchange="log('Dynamic color: '+this.checked)">
        <div class="check-box">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="check-label">Enable dynamic color</span>
      </label>

      <div class="field-wrapper">
        <select class="m3-select" onchange="log('Theme: '+this.value)">
          <option>Violet Dream</option>
          <option>Teal Harmony</option>
          <option>Earthy Amber</option>
          <option>Rose Quartz</option>
        </select>
        <div class="field-floating-label">Color scheme</div>
        <svg class="field-arrow" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path d="M5 7l5 5 5-5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="text-field-wrapper">
        <input class="m3-input" type="text" id="titleInput" placeholder=" "
          oninput="log('Label: '+this.value)">
        <label class="input-label" for="titleInput">Menu label</label>
      </div>

      <div class="output">
        <div class="output-dot"></div>
        <span id="output">Waiting for input</span>
      </div>
    </div>
  </div>

  <script>
    function log(msg) {
      document.getElementById('output').textContent = msg;
    }
  </script>
</body>
</html>
