<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tron Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cyan: #4fd1ff; --cyan-dim: #1a6b8a; --orange: #ff8b1f; --bg: #000814; --panel: #001524; }
    body {
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh; padding: 40px 20px;
      display: flex; align-items: flex-start; justify-content: center;
      background:
        linear-gradient(180deg, #000814 0%, #000a1a 80%, #002137 100%);
      color: var(--cyan); overflow-x: hidden;
    }
    /* Perspective grid */
    body::before {
      content: ''; position: fixed; left: 0; right: 0; bottom: 0; height: 55vh;
      background:
        linear-gradient(var(--cyan) 1px, transparent 1px) 0 0 / 100% 40px,
        linear-gradient(90deg, var(--cyan) 1px, transparent 1px) 0 0 / 40px 100%;
      transform: perspective(500px) rotateX(60deg);
      transform-origin: bottom center;
      opacity: 0.35;
      mask-image: linear-gradient(180deg, transparent 0%, #000 40%, #000 100%);
      -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 40%, #000 100%);
      animation: gridpulse 4s ease-in-out infinite;
    }
    @keyframes gridpulse { 50% { opacity: 0.5; } }

    .card {
      position: relative; z-index: 1;
      width: 440px; padding: 28px;
      background: rgba(0,8,20,0.85);
      border: 1px solid var(--cyan);
      box-shadow:
        0 0 0 3px rgba(79,209,255,0.08),
        0 0 30px rgba(79,209,255,0.35),
        inset 0 0 40px rgba(79,209,255,0.05);
      clip-path: polygon(18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%, 0 18px);
    }
    .tag-row {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Orbitron', sans-serif; font-size: 10px;
      letter-spacing: 2px; color: var(--cyan-dim);
      margin-bottom: 6px;
    }
    .tag-row .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
    .tag-row .tag { border: 1px solid var(--cyan); padding: 2px 6px; color: var(--cyan); }

    h1 {
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      font-size: 34px; letter-spacing: 4px; line-height: 1;
      color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan), 0 0 24px var(--cyan);
    }
    .sub {
      font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 6px;
      color: var(--cyan-dim); margin-top: 6px; margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(79,209,255,0.3);
    }

    .section-title {
      font-family: 'Orbitron', sans-serif; font-size: 10px;
      letter-spacing: 3px; color: var(--cyan); margin-bottom: 10px;
    }
    .section-title::before { content: '// '; color: var(--cyan-dim); }

    .btn-row { display: flex; gap: 12px; margin-bottom: 20px; }
    .btn {
      flex: 1; padding: 11px;
      font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
      background: transparent; color: var(--cyan);
      border: 1px solid var(--cyan);
      clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }
    .btn:hover { background: var(--cyan); color: var(--bg); box-shadow: 0 0 20px var(--cyan); }
    .btn-primary {
      background: var(--cyan); color: var(--bg);
      box-shadow: 0 0 14px var(--cyan), inset 0 0 12px rgba(255,255,255,0.3);
      text-shadow: 0 0 6px rgba(0,8,20,0.3);
    }
    .btn-primary:hover { box-shadow: 0 0 24px var(--cyan); filter: brightness(1.15); }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: flex; justify-content: space-between;
      font-family: 'Orbitron', sans-serif; font-size: 10px;
      letter-spacing: 2px; color: rgba(79,209,255,0.75); margin-bottom: 6px;
    }
    .form-label .value { color: var(--orange); text-shadow: 0 0 6px var(--orange); }

    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 2px;
      background: var(--cyan-dim); outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: var(--cyan); transform: rotate(45deg);
      box-shadow: 0 0 12px var(--cyan);
    }

    .checkbox-row {
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      padding: 9px 12px; border: 1px solid rgba(79,209,255,0.4);
      background: rgba(79,209,255,0.05); margin-bottom: 16px;
    }
    .checkbox-row:hover { border-color: var(--cyan); }
    .checkbox-row input { display: none; }
    .chk {
      width: 16px; height: 16px; border: 1.5px solid var(--cyan);
      background: transparent; position: relative; flex-shrink: 0;
    }
    input[type="checkbox"]:checked ~ .chk {
      background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
    }
    input[type="checkbox"]:checked ~ .chk::after {
      content: ''; position: absolute; left: 4px; top: 0;
      width: 5px; height: 10px; border: solid var(--bg);
      border-width: 0 2px 2px 0; transform: rotate(45deg);
    }
    .chk-label {
      font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 2px;
      color: var(--cyan);
    }

    select, input[type="text"] {
      width: 100%; padding: 10px 12px;
      font-family: 'Share Tech Mono', monospace; font-size: 14px;
      color: var(--cyan); background: rgba(0,10,26,0.8);
      border: 1px solid var(--cyan); outline: none;
      letter-spacing: 1px;
    }
    select option { background: var(--bg); }
    select:focus, input[type="text"]:focus { box-shadow: 0 0 12px rgba(79,209,255,0.5); }
    input[type="text"]::placeholder { color: var(--cyan-dim); }

    .output {
      margin-top: 18px; padding: 12px;
      background: rgba(0,10,26,0.9); border: 1px solid var(--cyan-dim);
      font-family: 'Share Tech Mono', monospace; font-size: 12px;
      color: rgba(79,209,255,0.7); min-height: 38px;
    }
    .output strong { color: var(--orange); text-shadow: 0 0 6px var(--orange); }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag-row">
      <span class="dot"></span>
      <span class="tag">GRID.v2.0</span>
      <span>USER // PROGRAM</span>
    </div>

    <h1>END OF LINE</h1>
    <div class="sub">I · D · E · N · T · I · F · Y</div>

    <div class="section-title">command</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="log('DEREZZED')">Derezz</button>
      <button class="btn" onclick="log('RECOMPILE')">Compile</button>
    </div>

    <div class="form-group">
      <div class="form-label"><span>cycle speed</span><span class="value" id="v">0.75c</span></div>
      <input type="range" min="0" max="100" value="75" oninput="document.getElementById('v').textContent=(this.value/100).toFixed(2)+'c';log('SPEED '+this.value)">
    </div>

    <label class="checkbox-row">
      <input type="checkbox" checked onchange="log('IDENTITY_DISC '+this.checked)">
      <span class="chk"></span>
      <span class="chk-label">IDENTITY DISC</span>
    </label>

    <div class="form-group">
      <div class="form-label">routine</div>
      <select onchange="log('ROUTINE '+this.value)">
        <option>LIGHTCYCLE</option><option>RECOGNIZER</option>
        <option>DISC WAR</option><option>I/O TOWER</option>
      </select>
    </div>

    <div class="form-group">
      <input type="text" placeholder="program.id..." oninput="log('PROGRAM '+this.value)">
    </div>

    <div class="output" id="out">&gt; SYSTEM: <strong>ONLINE</strong> // awaiting directive</div>
  </div>
  <script>function log(m){document.getElementById('out').innerHTML='&gt; <strong>'+m+'</strong>';}</script>
</body>
</html>
