<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brutalism Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Archivo+Black&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #ffff00;
      background-image:
        linear-gradient(90deg, rgba(0,0,0,0.08) 1px, transparent 1px),
        linear-gradient(rgba(0,0,0,0.08) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .card {
      width: 420px;
      padding: 32px;
      background: #ffffff;
      border: 4px solid #000;
      box-shadow: 12px 12px 0 #000;
    }
    .eyebrow {
      display: inline-block;
      background: #ff2d55;
      color: #fff;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
      border: 3px solid #000;
    }
    h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: 36px;
      line-height: 1;
      color: #000;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    p.sub { font-size: 13px; color: #000; margin-bottom: 24px; font-weight: 700; }
    .section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      background: #000; color: #fff; padding: 4px 8px; margin-bottom: 10px; display: inline-block;
    }
    .btn-row { display: flex; gap: 12px; margin-bottom: 20px; }
    .btn {
      flex: 1; padding: 14px 16px; font-family: 'Space Mono', monospace;
      font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      border: 3px solid #000; cursor: pointer; transition: transform 0.08s, box-shadow 0.08s;
    }
    .btn-primary { background: #00ff88; color: #000; box-shadow: 5px 5px 0 #000; }
    .btn-secondary { background: #fff; color: #000; box-shadow: 5px 5px 0 #000; }
    .btn:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 #000; }
    .btn:active { transform: translate(3px,3px); box-shadow: 0 0 0 #000; }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: flex; justify-content: space-between;
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 6px; color: #000;
    }
    .form-label span { background: #000; color: #fff; padding: 2px 8px; }
    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 22px;
      background: #fff; border: 3px solid #000; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px;
      background: #ff2d55; border: 3px solid #000;
      margin-top: -3px;
    }
    .checkbox-row {
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      padding: 10px 12px; background: #fff; border: 3px solid #000;
      margin-bottom: 18px; font-weight: 700;
    }
    .checkbox-row input { display: none; }
    .chk { width: 22px; height: 22px; border: 3px solid #000; background: #fff; position: relative; flex-shrink: 0; }
    input[type="checkbox"]:checked ~ .chk { background: #00ff88; }
    input[type="checkbox"]:checked ~ .chk::after {
      content: 'X'; font-family: 'Archivo Black', sans-serif;
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      color: #000; font-size: 14px;
    }
    select, input[type="text"] {
      width: 100%; padding: 10px 12px; border: 3px solid #000;
      font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700;
      background: #fff; color: #000; outline: none;
    }
    select:focus, input[type="text"]:focus { background: #ffeb3b; }
    .output {
      margin-top: 20px; padding: 12px; background: #000; color: #00ff88;
      font-size: 12px; font-weight: 700; border: 3px solid #000;
    }
    .output strong { color: #ffff00; }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">STYLE · 04</div>
    <h1>BRUTALISM</h1>
    <p class="sub">// RAW. BOLD. UNAPOLOGETIC.</p>

    <div class="section-title">Actions</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="log('APPLY')">APPLY</button>
      <button class="btn btn-secondary" onclick="log('RESET')">RESET</button>
    </div>

    <div class="form-group">
      <div class="form-label">VOLUME <span id="v">60%</span></div>
      <input type="range" min="0" max="100" value="60" oninput="document.getElementById('v').textContent=this.value+'%';log('VOL '+this.value)">
    </div>

    <label class="checkbox-row">
      <input type="checkbox" onchange="log('GRID '+this.checked)">
      <span class="chk"></span>
      <span>SHOW GRID OVERLAY</span>
    </label>

    <div class="form-group">
      <div class="form-label">THEME</div>
      <select onchange="log('THEME '+this.value)">
        <option>ACID YELLOW</option><option>HOT PINK</option>
        <option>ELECTRIC BLUE</option><option>CONCRETE GRAY</option>
      </select>
    </div>

    <div class="form-group">
      <input type="text" placeholder="TYPE SOMETHING..." oninput="log('INPUT '+this.value)">
    </div>

    <div class="output" id="out"><strong>STATUS:</strong> AWAITING INPUT_</div>
  </div>
  <script>
    function log(m){document.getElementById('out').innerHTML='<strong>STATUS:</strong> '+m;}
  </script>
</body>
</html>
