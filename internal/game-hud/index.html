<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game HUD Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #00ffd0; --warn: #ff3a5e; --panel: rgba(4, 14, 20, 0.82); }
    html, body { height: 100%; overflow: hidden; font-family: 'Rajdhani', sans-serif; color: #e6ffff; }
    body {
      background:
        radial-gradient(ellipse at 20% 20%, #0a3548 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, #2d0a3f 0%, transparent 55%),
        linear-gradient(160deg, #010a0f 0%, #0a1524 100%);
      position: relative;
    }
    /* Pretend game scene */
    .scene::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 30% 40%, rgba(0,255,208,0.1), transparent 20%),
        radial-gradient(circle at 70% 60%, rgba(255,58,94,0.12), transparent 25%);
    }
    .scene::after {
      content: ''; position: fixed; inset: 0;
      background:
        linear-gradient(transparent 50%, rgba(0,0,0,0.2) 50%);
      background-size: 100% 3px; opacity: 0.25; pointer-events: none;
    }

    /* Top-left: Player status */
    .hud { position: fixed; z-index: 10; pointer-events: auto; }
    .player {
      top: 20px; left: 20px; display: flex; align-items: center; gap: 14px;
      background: var(--panel); padding: 12px 16px;
      clip-path: polygon(0 0, 100% 0, calc(100% - 14px) 100%, 0 100%);
      border-left: 3px solid var(--accent);
      box-shadow: 0 0 18px rgba(0,255,208,0.2);
    }
    .avatar {
      width: 42px; height: 42px; border-radius: 4px;
      background: linear-gradient(135deg, #00ffd0, #0088b8);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif; font-weight: 800; color: #001a20;
    }
    .pname { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; }
    .pclass { font-size: 11px; color: var(--accent); letter-spacing: 2px; }
    .bars { width: 160px; }
    .bar {
      height: 5px; background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15); margin-bottom: 3px;
      position: relative; overflow: hidden;
    }
    .bar-fill { height: 100%; transition: width 0.3s; }
    .bar-hp .bar-fill { background: linear-gradient(90deg, #ff3a5e, #ff8a3a); width: 72%; }
    .bar-mp .bar-fill { background: linear-gradient(90deg, #3a8aff, #00c8ff); width: 45%; }
    .bar-label { font-size: 9px; letter-spacing: 2px; display: flex; justify-content: space-between; opacity: 0.7; }

    /* Top-right: mini-map / stats */
    .stats {
      top: 20px; right: 20px;
      background: var(--panel); padding: 10px 14px;
      border-right: 3px solid var(--accent);
      clip-path: polygon(14px 0, 100% 0, 100% 100%, 0 100%);
      display: flex; gap: 18px;
    }
    .stat-item { text-align: center; }
    .stat-val { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); }
    .stat-lbl { font-size: 10px; letter-spacing: 2px; opacity: 0.7; text-transform: uppercase; }

    /* Centered objective */
    .objective {
      top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--panel); padding: 8px 24px;
      border: 1px solid rgba(0,255,208,0.4);
      font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 3px;
      text-align: center;
    }
    .objective .marker { color: var(--accent); }

    /* Main control panel (bottom-center) */
    .panel {
      bottom: 28px; left: 50%; transform: translateX(-50%);
      width: 460px; background: var(--panel);
      border: 1px solid rgba(0,255,208,0.35);
      padding: 20px 22px;
      clip-path: polygon(16px 0, calc(100% - 16px) 0, 100% 100%, 0 100%);
      box-shadow: 0 0 30px rgba(0,255,208,0.18), inset 0 0 40px rgba(0,255,208,0.04);
    }
    .panel-title {
      font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 4px;
      color: var(--accent); margin-bottom: 10px; text-align: center;
    }
    .btn-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .btn {
      flex: 1; padding: 9px;
      font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer;
      background: transparent; color: var(--accent);
      border: 1px solid var(--accent);
      clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
      transition: background 0.15s;
    }
    .btn:hover { background: rgba(0,255,208,0.15); }
    .btn-primary { background: var(--accent); color: #001a20; }
    .btn-primary:hover { background: #00e0b8; }

    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;
    }
    .form-group { margin-bottom: 10px; }
    .form-label {
      display: flex; justify-content: space-between;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(230,255,255,0.7); margin-bottom: 4px;
    }
    .form-label .value { color: var(--accent); }

    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 3px;
      background: rgba(0,255,208,0.25); outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 10px; height: 14px; background: var(--accent);
      clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    }
    .chkrow { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 12px; }
    .chkrow input { display: none; }
    .chkrow .chk {
      width: 14px; height: 14px; border: 1px solid var(--accent);
      position: relative; flex-shrink: 0;
    }
    .chkrow input:checked ~ .chk { background: var(--accent); }
    .chkrow input:checked ~ .chk::after {
      content: ''; position: absolute; left: 4px; top: 0;
      width: 4px; height: 8px; border: solid #001a20;
      border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
    }

    select, input[type="text"] {
      width: 100%; padding: 6px 10px;
      background: rgba(0,0,0,0.4); color: #e6ffff;
      border: 1px solid rgba(0,255,208,0.4);
      font-family: 'Rajdhani', sans-serif; font-size: 12px; outline: none;
    }
    select option { background: #010a0f; }
    select:focus, input[type="text"]:focus { border-color: var(--accent); }

    .output {
      margin-top: 10px; padding: 8px 12px;
      background: rgba(0,0,0,0.35); border: 1px solid rgba(0,255,208,0.25);
      font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 2px;
      color: rgba(230,255,255,0.6);
    }
    .output strong { color: var(--accent); }

    /* Radar / corner */
    .radar {
      bottom: 28px; right: 20px;
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,208,0.15) 0%, rgba(0,0,0,0.7) 75%);
      border: 1px solid var(--accent);
      box-shadow: 0 0 20px rgba(0,255,208,0.25), inset 0 0 20px rgba(0,255,208,0.15);
      overflow: hidden;
    }
    .radar::before, .radar::after {
      content: ''; position: absolute; inset: 0; margin: auto;
      width: 1px; height: 100%; background: rgba(0,255,208,0.3);
    }
    .radar::after { transform: rotate(90deg); }
    .sweep {
      position: absolute; inset: 0;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(0,255,208,0.5) 30deg, transparent 60deg);
      animation: spin 4s linear infinite;
    }
    .dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; background: var(--warn); box-shadow: 0 0 6px var(--warn); }
    .dot.a { top: 30%; left: 60%; } .dot.b { top: 65%; left: 40%; background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="scene">
  <!-- Top-left: player -->
  <div class="hud player">
    <div class="avatar">K</div>
    <div>
      <div class="pname">KAIRO.77</div>
      <div class="pclass">STRIKER · LV 42</div>
    </div>
    <div class="bars">
      <div class="bar-label"><span>HP</span><span>720/1000</span></div>
      <div class="bar bar-hp"><div class="bar-fill"></div></div>
      <div class="bar-label"><span>MP</span><span>90/200</span></div>
      <div class="bar bar-mp"><div class="bar-fill"></div></div>
    </div>
  </div>

  <!-- Top-center: objective -->
  <div class="hud objective"><span class="marker">◆</span> OBJECTIVE — Capture the relay at Sector 7</div>

  <!-- Top-right: stats -->
  <div class="hud stats">
    <div class="stat-item"><div class="stat-val">23</div><div class="stat-lbl">kills</div></div>
    <div class="stat-item"><div class="stat-val">4</div><div class="stat-lbl">deaths</div></div>
    <div class="stat-item"><div class="stat-val">12:04</div><div class="stat-lbl">time</div></div>
  </div>

  <!-- Bottom-center: control panel -->
  <div class="hud panel">
    <div class="panel-title">// TACTICAL CONSOLE</div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="log('DEPLOYED')">Deploy</button>
      <button class="btn" onclick="log('RECALLED')">Recall</button>
    </div>

    <div class="form-row">
      <div class="form-group">
        <div class="form-label"><span>Shield</span><span class="value" id="v">65</span></div>
        <input type="range" min="0" max="100" value="65" oninput="document.getElementById('v').textContent=this.value;log('Shield '+this.value)">
      </div>
      <div class="form-group">
        <div class="form-label"><span>Loadout</span></div>
        <select onchange="log('Loadout '+this.value)">
          <option>Assault</option><option>Scout</option>
          <option>Sniper</option><option>Medic</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <input type="text" placeholder="// radio call..." oninput="log('Radio: '+this.value)">
    </div>

    <label class="chkrow">
      <input type="checkbox" onchange="log('Auto-revive '+this.checked)">
      <span class="chk"></span>
      <span>Enable auto-revive protocol</span>
    </label>

    <div class="output" id="out"><strong>[COMM]</strong> channel open — standby</div>
  </div>

  <!-- Bottom-right: radar -->
  <div class="hud radar">
    <div class="sweep"></div>
    <div class="dot a"></div>
    <div class="dot b"></div>
  </div>

  <script>function log(m){document.getElementById('out').innerHTML='<strong>[COMM]</strong> '+m;}</script>
</body>
</html>
